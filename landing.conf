server {
  listen       80;
  server_name  localhost;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /studio/index.html;
  }

  location /studio/public/ {
    root /usr/share/nginx/html/studio/;
  }

  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }
}
