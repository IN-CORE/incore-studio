server {
  listen       80;
  server_name  localhost;

  location /studio/ {
    root /usr/share/nginx/html;
    index studio/index.html studio/index.htm;
    try_files $uri /studio/index.html;
  }

  # Serve static files directly (including public/config/)
    location /studio/config/ {
        root /usr/share/nginx/html;
    }

  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }
}
